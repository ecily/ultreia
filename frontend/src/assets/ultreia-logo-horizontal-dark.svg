
<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pinGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Icon -->
  <g transform="translate(40,20)" filter="url(#softShadow)">
    <!-- Map pin shape -->
    <path d="M110 0C68 0 34 34 34 76C34 132 110 214 110 214C110 214 186 132 186 76C186 34 152 0 110 0Z" fill="url(#pinGrad)"/>
    <!-- Inner circle -->
    <circle cx="110" cy="82" r="36" fill="#FFFFFF" opacity="0.95"/>
    <!-- Steps path (three dots) -->
    <circle cx="92" cy="86" r="5" fill="#10B981"/>
    <circle cx="104" cy="94" r="6" fill="#10B981"/>
    <circle cx="118" cy="86" r="7" fill="#10B981"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(260,92)">
    <text x="0" y="64" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-weight="800" font-size="88" fill="#0F172A" letter-spacing="-0.5">steps</text>
    <text x="268" y="64" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-weight="800" font-size="88" fill="#2563EB" letter-spacing="-0.5">match</text>

    <!-- USP tagline -->
    <text x="4" y="120" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-weight="500" font-size="24" fill="#475569">
      finden. nicht suchen.
    </text>
  </g>
</svg>
